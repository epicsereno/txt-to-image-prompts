A traditional Japanese tea house nestled in a zen garden with raked gravel,
moss-covered stones, and a curved wooden bridge over a koi pond. Morning fog
softens the bamboo grove behind the structure. Serene architectural photography
with natural materials, balanced composition, and diffused overcast light.