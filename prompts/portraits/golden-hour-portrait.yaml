A close-up portrait of a young woman with freckles and windswept auburn hair,
standing in a sunlit meadow at golden hour. Soft bokeh wildflowers blur in the
background while warm natural light wraps her face. Shot on an 85mm lens at
f/1.4 with shallow depth of field and subtle film grain, editorial fashion
photography style.