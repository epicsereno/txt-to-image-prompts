A serene alpine lake at dawn, perfectly mirroring snow-capped peaks that rise
through layers of morning mist. Pine forests line the shoreline, their dark
silhouettes reflected in glassy water. Soft pink and gold light breaks over the
ridgeline, atmospheric perspective fading distant mountains into pale blue haze.