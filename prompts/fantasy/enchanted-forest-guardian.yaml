An ancient treant guardian emerges from a bioluminescent forest, moss and
glowing mushrooms covering its bark-like skin. Fireflies drift through shafts
of emerald light filtering through a canopy of impossibly tall trees. Fantasy
illustration style with rich jewel tones, detailed organic textures, and a
sense of quiet ancient wisdom.