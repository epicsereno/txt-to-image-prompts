A narrow alley in a futuristic megacity drenched in rain, neon kanji signs and
holographic ads reflecting in puddles on cracked pavement. Steam rises from
vents while a lone figure in a translucent raincoat walks away into the glow.
Blade Runner-inspired cinematography with deep teal and magenta color grading,
wet surfaces, and atmospheric haze.